<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>British Denim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 

<!-- CSS  -->
<link rel="stylesheet" href="css/main.css">

<link rel="stylesheet" href="css/pages/dashboard.css">

</head>

<body>

  <!-- TOPBAR -->
<div class="top-bar">
  <p>Autentica tu producto original British Denim</p>
</div>


<!-- HEADER -->
<div id="header"></div>

<!-- PERFIL DE USUARIO -->
<section class="profile-wrapper">

  <div class="profile-card">

    <!-- Header Perfil -->
    <div class="profile-header">

      <div class="profile-avatar">
        <!-- Cambia la clase a male o female dinámicamente -->
        <div class="avatar-icon male">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>

      <div class="profile-info">
        <h2>Juan Pérez</h2>
        <p class="country">🇵🇦 Panamá</p>
        <div class="product-counter">
          <span>2</span> productos registrados
        </div>
      </div>

      <div class="profile-actions">
        <button class="btn-edit">Editar Perfil</button>
        <button class="btn-logout" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        Cerrar Sesión
      </button>
      </div>

    </div>

    <!-- Referencias -->
    <div class="profile-references">
      <h3>Referencias Registradas</h3>

      <div class="reference-card">
        <div class="ref-header">
          <strong>REF-00123</strong>
          <span class="ref-date">12 Enero 2026</span>
        </div>
        <p>Jeans slim fit azul oscuro con detalles premium.</p>
      </div>

      <div class="reference-card">
        <div class="ref-header">
          <strong>REF-00987</strong>
          <span class="ref-date">05 Febrero 2026</span>
        </div>
        <p>Chaqueta denim clásica edición limitada.</p>
      </div>

    </div>

  </div>

</section>
    
<!-- FOOTER -->
<div id="footer"></div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<!-- HEADER Y FOOTER -->
<script src="js/include.js"></script>

<!-- LLAMADO DE SCRIPTS EN JS-->
<script src="js/scroll-reveal.js"></script>
<!-- JS del top bar  -->
<script src="js/topbar-loop.js" defer></script>
<script src="js/top-bar-parallax.js"></script> 

<script src="js/menu.js"></script>
<script src="js/singup.js"></script>

<script src="js/dashboard.js"></script>
<script src="js/auth.js"></script>

		
</body>
</html>
