<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>British Denim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 

<!-- CSS  -->
<link rel="stylesheet" href="css/main.css">


</head>

<body>

  <!-- TOPBAR -->
<div class="top-bar">
  <p>Autentica tu producto original British Denim</p>
</div>


<!-- HEADER -->
<div id="header"></div>

<!--Cambio de contraseña-->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="form-group">
        <label for="contrasenaActual">Contraseña Actual</label>
        <input type="password" class="form-control" id="contrasenaActual" placeholder="Ingrese su contraseña actual">
      </div>
      <div class="form-group">
        <label for="nuevaContrasena">Nueva Contraseña</label>
        <input type="password" class="form-control" id="nuevaContrasena" placeholder="Ingrese su nueva contraseña">
      </div>
      <div class="form-group">
        <label for="confirmarContrasena">Confirmar Nueva Contraseña</label>
        <input type="password" class="form-control" id="confirmarContrasena" placeholder="Confirme su nueva contraseña">
      </div>
      <button type="button" class="btn btn-primary w-100 mt-3">Cambiar Contraseña</button>
    </div>
  </div>
</div>


<!-- FOOTER -->
<div id="footer"></div>

<!-- HEADER Y FOOTER -->
<script src="js/include.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<!-- LLAMADO DE SCRIPTS EN JS-->
<script src="js/scroll-reveal.js"></script>
<!-- JS del top bar  -->
<script src="js/topbar-loop.js" defer></script>
<script src="js/top-bar-parallax.js"></script> 

<!-- LLAMA JS -->
<script src="js/menu.js"></script>
<script src="js/singup.js"></script>
		
</body>
</html>
