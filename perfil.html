<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>British Denim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 

<!-- CSS  -->
<link rel="stylesheet" href="css/main.css">

<link rel="stylesheet" href="css/pages/perfil.css">


</head>

<body>

 <!-- TOP BAR -->

<div class="top-bar">
  <p>Autentica tu producto original British Denim</p>
</div>

<!-- HEADER -->
<div id="header"></div>

<!-- SIGN IN / SIGN UP FORM -->
<section class="auth-wrapper">

  <div class="auth-left">
    <div class="auth-box">

      <!-- LOGIN -->
      <div id="loginForm" class="form-panel active">
        <h2>Iniciar Sesión</h2>

        <form method="POST">
          <div class="form-group">
            <input type="email" placeholder="Correo electrónico" required>
          </div>

          <div class="form-group">
            <input type="password" placeholder="Contraseña" required>
          </div>

          <button href=dashboard.html id="submit" class="btn-auth">
            Ingresar
          </button>
        </form>

        <p class="auth-switch">
          ¿No tienes cuenta?
          <a href="#" id="showRegister">Regístrate</a>
        </p>
      </div>

      <!-- REGISTRO -->
      <div id="registerForm" class="form-panel">
        <h2>Crear Cuenta</h2>

        <form>
          <div class="form-group">
            <input type="text" placeholder="Nombre" required>
          </div>

          <div class="form-group">
            <input type="email" placeholder="Correo electrónico" required>
          </div>

          <div class="form-group">
            <input type="password" placeholder="Contraseña" required>
          </div>

          <button type="submit" class="btn-auth">
            Registrarse
          </button>
        </form>

        <p class="auth-switch">
          ¿Ya tienes cuenta?
          <a href="#" id="showLogin">Inicia sesión</a>
        </p>
      </div>

    </div>
  </div>

  <div class="auth-right"></div>

</section>

<!-- FOOTER-->
<div id="footer"></div>

<!-- HEADER Y FOOTER -->
<script src="js/include.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>


<!-- JS del formulario de login/registro -->
<script src="js/auth.js"></script>


</body>
</html>
