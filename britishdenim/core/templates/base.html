{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>British Denim</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- CSS PRINCIPAL -->
<link rel="stylesheet" href="{% static 'css/main.css' %}">

<!-- CSS de cada página -->
{% block extra_css %}{% endblock %}

</head>


<body>

<!-- HEADER -->
{% include "components/header.html" %}


<!-- CONTENIDO DE LAS PÁGINAS -->
{% block content %}
{% endblock %}


<!-- FOOTER -->
{% include "components/footer.html" %}


<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<!-- JS GENERALES -->
<script src="{% static 'js/menu.js' %}"></script>
<script src="{% static 'js/topbar-loop.js' %}"></script>
<script src="{% static 'js/loader.js' %}"></script>
<script src="{% static 'js/scroll-reveal.js' %}"></script>
<script src="{% static 'js/reveal-init.js' %}"></script>
<script src="{% static 'js/scroll-to-top.js' %}"></script>
<script src="{% static 'js/scroll-animations.js' %}"></script>


<!-- JS por página -->
{% block extra_js %}{% endblock %}

</body>
</html>
