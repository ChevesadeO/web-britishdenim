<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contáctenos | British Denim</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/pages/contact.css">

</head>
<body>
  
<!-- TOPBAR -->
<div class="top-bar">
  <p>Autentica tu producto original British Denim</p>
</div>

<!-- HEADER -->
<div id="header"></div>

<!--Seccion de Contacto -->
<section class="contact-modern">
  <div class="contact-bg"></div>

  <div class="container">
    <div class="contact-card fade-up">

      <div class="row g-5">

        <!-- INFO -->
        <div class="col-lg-5 fade-up fade-up-delay-1">
          <div class="contact-info">
            <h4>Contáctenos</h4>

            <p>
              Estamos listos para conversar y crear nuevas oportunidades.
            </p>

            <div class="contact-item">
              <strong>Teléfono</strong><br>
              +507 433-9200
            </div>

            <div class="contact-item">
              <strong>Correo</strong><br>
              info@epcotsa.com
            </div>

            <div class="contact-item">
              <strong>Ubicación</strong><br>
              Zona Libre de Colón, Panamá
            </div>
          </div>
        </div>

        <!-- FORM -->
        <div class="col-lg-7 fade-up fade-up-delay-2">
          <form class="contact-form-modern">

            <input type="text" name="nombre" class="form-control mb-3" placeholder="Nombre" required>

            <input type="email" class="form-control mb-3" placeholder="Correo electrónico" required>

            <textarea class="form-control mb-4" rows="5" placeholder="Mensaje" required></textarea>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="terms" required>
              <label class="form-check-label" for="terms">
                Acepto los <a href="#" target="_blank">Términos y Condiciones</a>
              </label>
            </div>

            <button type="submit" class="btn btn-dark w-50">
              Enviar mensaje
            </button>

          </form>
        </div>

      </div>

    </div>
  </div>
</section>

<!-- MAPA UBICACIÓN -->
<section class="contact-map fade-up fade-up-delay-3">
  <div class="container">
    <div class="map-wrapper">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4664.676775189916!2d-79.89849642427171!3d9.352525590722273!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8fab6da1c5d75185%3A0x92df6a20245d0cbe!2sEpcot!5e1!3m2!1ses-419!2spa!4v1769017918981!5m2!1ses-419!2spa" style="border:0;"
        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>
</section>

<!-- FOOTER -->
<div id="footer"></div>

<!-- HEADER Y FOOTER -->
<script src="js/include.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/menu.js"></script>
<script src="js/scroll-reveal.js"></script>
<script src="js/map-parallax.js"></script>
<script src="js/topbar-loop.js" defer></script>
<script src="js/top-bar-parallax.js"></script>


</body>
</html>
