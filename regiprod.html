<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registra tu producto | British Denim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  
<!-- CSS  -->
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/pages/regiprod.css">

</head>


<body>

  <!-- TOPBAR -->
<div class="top-bar">
  <p>Autentica tu producto original British Denim</p>
</div>

<!-- HEADER -->
<div id="header"></div>

<main>

<!-- HERO BANNER -->
<section class="regprod-hero">
  <div class="container">
    <h1>Registro de Producto</h1>
  <!-- <p>Registra tu referencia y accede a beneficios exclusivos.</p> --> <!--no eliminar el codigo se puede reciclar-->
  </div>
</section>

<!-- FORM SECTION -->
<section class="regprod-section">

<div class="container">

<div class="regprod-card fade-up">

<form class="regprod-form">

<h3 class="regprod-title">
Verifica tu producto
</h3>

<p class="regprod-subtitle">
Ingresa la referencia para autenticar tu producto British Denim.
</p>

<label class="form-label">Referencia</label>

<input
type="text"
class="form-control"
placeholder="Ej. RE-12345"
required
>

<div class="regprod-actions">

<button type="submit" class="regprod-btn-primary">
Registrar producto
</button>

<a href="perfil.html" class="regprod-btn-secondary">
Ya tengo usuario
</a>

</div>

</form>

</div>

</div>

</section>    
</main>

<!-- sistema de autenticacion de producto con localStorage -->
<div id="authResult" class="auth-result"></div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script src="js/menu.js"></script>
<script src="js/topbar-loop.js" defer></script>
<!-- JS del top bar -->
<script src="js/top-bar-parallax.js"></script>

<!-- HEADER Y FOOTER -->
<script src="js/include.js"></script>

/** LLAMADO DE SCRIPTS EN JS base de datos de productos */
<script src="js/product-database.js"></script>
<script src="js/regprod.js"></script>

</body>
</html>
